<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.12"></script>
<script>
(async function () {
  try {
    // Fetch n2.html
    const res = await fetch('n2.html');
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Extract #app inner HTML
    const n2App = doc.querySelector('#app');
    if (!n2App) throw new Error('No #app found in n2.html');
    document.getElementById('app').innerHTML = n2App.innerHTML;

    // Extract and execute all <script> tags from n2.html (except Vue.js CDN)
    const scripts = doc.querySelectorAll('script');
    for (const script of scripts) {
      if (script.src && script.src.includes('vue')) continue; // skip Vue CDN
      const newScript = document.createElement('script');
      if (script.src) {
        newScript.src = script.src;
      } else {
        newScript.textContent = script.textContent;
      }
      document.body.appendChild(newScript);
    }
  } catch (err) {
    document.getElementById('app').innerHTML = '<div style="color:red">Failed to load app: ' + err.message + '</div>';
    console.error('Failed to load Vue app:', err);
  }
})();
</script>
